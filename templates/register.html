<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Odoo Clone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='odoo_style.css') }}">
</head>
<body class="auth-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo-container">
                <h1>Odoo Clone</h1>
                <h2>Crear una cuenta</h2>
            </div>
            
            <!-- Mostrar mensajes flash -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           placeholder="Ingresa tu usuario" 
                           required 
                           autofocus>
                    <small class="form-text">Nombre de usuario único</small>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           placeholder="Ingresa tu contraseña" 
                           required>
                    <small class="form-text">Mínimo 4 caracteres</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirmar contraseña</label>
                    <input type="password" 
                           id="confirm_password" 
                           name="confirm_password" 
                           placeholder="Repite tu contraseña" 
                           required>
                </div>
                
                <button type="submit" class="btn-primary btn-block">
                    Registrarse
                </button>
            </form>
            
            <div class="auth-links">
                <p>¿Ya tienes una cuenta? 
                    <a href="{{ url_for('auth.login') }}">Iniciar sesión</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
